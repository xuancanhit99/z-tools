name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config >/dev/null

  node-ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint ${{ matrix.app }}
        run: pnpm --filter @hyperz/${{ matrix.app }} lint

      - name: Build ${{ matrix.app }}
        run: pnpm --filter @hyperz/${{ matrix.app }} build

  docker-build-and-health:
    runs-on: ubuntu-latest
    needs: [compose-validate]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t hyperz-be:ci .

      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t hyperz-fe:ci .

      - name: Start stack
        run: docker compose up -d --build --remove-orphans

      - name: Wait for health checks
        shell: bash
        run: |
          set -euo pipefail

          wait_for_healthy() {
            local container="$1"
            local attempts="${2:-30}"
            local sleep_seconds="${3:-5}"
            local status=""

            for ((i=1; i<=attempts; i++)); do
              status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$container" 2>/dev/null || echo missing)"
              if [ "$status" = "healthy" ]; then
                echo "$container is healthy"
                return 0
              fi
              if [ "$status" = "unhealthy" ]; then
                echo "$container became unhealthy" >&2
                docker logs "$container" || true
                return 1
              fi
              echo "Waiting for $container (attempt $i/$attempts, status=$status)"
              sleep "$sleep_seconds"
            done

            echo "Timed out waiting for $container health (last status=$status)" >&2
            docker logs "$container" || true
            return 1
          }

          wait_for_healthy hyperz-postgres
          wait_for_healthy hyperz-redis
          wait_for_healthy hyperz-be
          wait_for_healthy hyperz-fe

      - name: Show compose status on failure
        if: failure()
        run: docker compose ps && docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans
